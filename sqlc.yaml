version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/repository/postgres/queries"
    schema: "migrations"
    gen:
      go:
        package: "repository"
        out: "internal/repository/postgres"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        overrides:
          - column: "transactions.amount"
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Numeric"
