<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <!-- Блокируем системный зум двойным тапом на iOS WebKit -->
  <meta name="format-detection" content="telephone=no" />
  <title>FlowMoney</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Skeleton overlay — виден во время инициализации -->
  <div id="skeleton" class="skeleton-overlay" aria-hidden="true">
    <div class="skeleton-header shimmer"></div>
    <div class="skeleton-card shimmer"></div>
    <div class="skeleton-list">
      <div class="skeleton-row shimmer"></div>
      <div class="skeleton-row shimmer"></div>
      <div class="skeleton-row shimmer"></div>
    </div>
  </div>

  <!-- Корень приложения — скрыт до готовности -->
  <div id="app" class="app hidden">

    <!-- ═══════════════════════════════════════
         Экран 1: Главная (быстрый ввод)
    ═══════════════════════════════════════ -->
    <section id="screen-home" class="screen active" role="main">
      <div class="screen-content">
        <!-- Виджет доступного бюджета -->
        <div class="budget-widget">
          <p class="budget-label">Доступно сегодня</p>
          <p id="daily-available" class="budget-amount">—</p>
        </div>

        <!-- Карусель категорий -->
        <div class="category-carousel-wrap">
          <div id="category-carousel" class="category-carousel" role="listbox" aria-label="Категории">
            <!-- Категории рендерятся через JS -->
          </div>
        </div>

        <!-- Дисплей вводимой суммы -->
        <div class="numpad-display" aria-live="polite">
          <span id="amount-display" class="amount-display">0</span>
          <span class="amount-currency" id="currency-symbol">₽</span>
        </div>

        <!-- Кастомный нампад -->
        <div class="numpad" role="group" aria-label="Цифровая клавиатура">
          <button class="numpad-key" data-key="7">7</button>
          <button class="numpad-key" data-key="8">8</button>
          <button class="numpad-key" data-key="9">9</button>

          <button class="numpad-key" data-key="4">4</button>
          <button class="numpad-key" data-key="5">5</button>
          <button class="numpad-key" data-key="6">6</button>

          <button class="numpad-key" data-key="1">1</button>
          <button class="numpad-key" data-key="2">2</button>
          <button class="numpad-key" data-key="3">3</button>

          <button class="numpad-key" data-key=".">.</button>
          <button class="numpad-key" data-key="0">0</button>
          <button class="numpad-key numpad-key--action" data-key="backspace" aria-label="Удалить">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
              <line x1="18" y1="9" x2="12" y2="15"/>
              <line x1="12" y1="9" x2="18" y2="15"/>
            </svg>
          </button>
        </div>

        <!-- Кнопка добавления -->
        <button id="btn-add" class="btn-add" disabled aria-label="Добавить транзакцию">
          Добавить
        </button>
      </div>
    </section>

    <!-- ═══════════════════════════════════════
         Экран 2: Аналитика
    ═══════════════════════════════════════ -->
    <section id="screen-analytics" class="screen" role="main" aria-hidden="true">
      <div class="screen-content">
        <h2 class="screen-title">Аналитика</h2>
        <!-- Donut-чарт и таймлайн — Этап 5 -->
        <div id="donut-container" class="donut-container">
          <canvas id="donut-canvas" aria-label="Расходы по категориям"></canvas>
        </div>
        <div id="timeline" class="timeline" role="list">
          <!-- Транзакции рендерятся через JS -->
        </div>
      </div>
    </section>

    <!-- ═══════════════════════════════════════
         Экран 3: Настройки
    ═══════════════════════════════════════ -->
    <section id="screen-settings" class="screen" role="main" aria-hidden="true">
      <div class="screen-content">
        <h2 class="screen-title">Настройки</h2>

        <!-- Валюта -->
        <div class="settings-section">
          <h3 class="settings-section-title">Валюта</h3>
          <div class="currency-select-wrap">
            <div id="custom-currency-select" class="custom-select" role="button"
                 aria-haspopup="listbox" aria-label="Выбор валюты">
              <span id="custom-currency-label" class="custom-select-label">₽ Российский рубль</span>
              <svg class="custom-select-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   aria-hidden="true">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </div>
          </div>
        </div>

        <!-- Лимиты -->
        <div class="settings-section">
          <h3 class="settings-section-title">Лимиты расходов</h3>
          <div class="budget-settings">

            <div class="budget-setting-block">
              <div class="budget-setting-header">
                <span class="budget-setting-label">Дневной лимит</span>
                <button class="limit-value limit-value--tap" id="daily-limit-display"
                        data-limit="daily" aria-label="Изменить дневной лимит">—</button>
              </div>
            </div>

            <div class="budget-setting-block">
              <div class="budget-setting-header">
                <span class="budget-setting-label">Недельный лимит</span>
                <button class="limit-value limit-value--tap" id="weekly-limit-display"
                        data-limit="weekly" aria-label="Изменить недельный лимит">—</button>
              </div>
              <div class="budget-progress-wrap">
                <div class="budget-progress-track">
                  <div id="weekly-progress-bar" class="budget-progress-bar"></div>
                </div>
                <div class="budget-progress-meta">
                  <span>Потрачено</span>
                  <span id="weekly-spend-display">—</span>
                </div>
              </div>
            </div>

            <div class="budget-setting-block">
              <div class="budget-setting-header">
                <span class="budget-setting-label">Месячный лимит</span>
                <button class="limit-value limit-value--tap" id="monthly-limit-display"
                        data-limit="monthly" aria-label="Изменить месячный лимит">—</button>
              </div>
              <div class="budget-progress-wrap">
                <div class="budget-progress-track">
                  <div id="monthly-progress-bar" class="budget-progress-bar"></div>
                </div>
                <div class="budget-progress-meta">
                  <span>Потрачено</span>
                  <span id="monthly-spend-display">—</span>
                </div>
              </div>
            </div>

          </div>
        </div>

        <!-- Конвертер -->
        <div class="settings-section">
          <h3 class="settings-section-title">Конвертер</h3>
          <div class="converter-widget">
            <div class="converter-row">
              <button class="converter-amount-btn" id="converter-from-amount" aria-label="Сумма для конвертации">0</button>
              <select class="converter-currency-select" id="converter-from-currency" aria-label="Исходная валюта">
                <option value="RUB">₽ RUB</option>
                <option value="GEL">₾ GEL</option>
                <option value="USD">$ USD</option>
                <option value="EUR">€ EUR</option>
              </select>
            </div>
            <button class="converter-swap-btn" id="converter-swap" aria-label="Поменять валюты местами">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 16V4m0 0L3 8m4-4 4 4"/><path d="M17 8v12m0 0 4-4m-4 4-4-4"/>
              </svg>
            </button>
            <div class="converter-row">
              <div class="converter-amount-result" id="converter-to-amount" aria-live="polite">0</div>
              <select class="converter-currency-select" id="converter-to-currency" aria-label="Целевая валюта">
                <option value="RUB">₽ RUB</option>
                <option value="GEL">₾ GEL</option>
                <option value="USD">$ USD</option>
                <option value="EUR">€ EUR</option>
              </select>
            </div>
          </div>
        </div>

      </div>
    </section>

    <!-- ═══════════════════════════════════════
         Нижняя навигация
    ═══════════════════════════════════════ -->
    <nav class="bottom-nav" role="tablist" aria-label="Навигация">
      <button class="nav-tab active" role="tab" data-tab="home" aria-selected="true" aria-controls="screen-home">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Главная</span>
      </button>

      <button class="nav-tab" role="tab" data-tab="analytics" aria-selected="false" aria-controls="screen-analytics">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span>Аналитика</span>
      </button>

      <button class="nav-tab" role="tab" data-tab="settings" aria-selected="false" aria-controls="screen-settings">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>Настройки</span>
      </button>
    </nav>

  </div><!-- /#app -->

  <!-- ═══════════════════════════════════════
       Шторка: ввод лимита бюджета
  ═══════════════════════════════════════ -->
  <div id="budget-modal" class="budget-modal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="budget-modal-backdrop"></div>
    <div class="budget-modal-sheet">
      <div class="budget-modal-handle"></div>
      <div class="budget-modal-header">
        <span id="budget-modal-title" class="budget-modal-title">Лимит</span>
        <button id="budget-modal-close" class="budget-modal-close" aria-label="Закрыть">✕</button>
      </div>
      <div class="budget-modal-display">
        <span id="budget-modal-amount" class="budget-modal-amount">0</span>
        <span id="budget-modal-currency" class="budget-modal-currency">₽</span>
      </div>
      <!-- Нампад переиспользует те же CSS-классы; логика в settings.js -->
      <div class="numpad numpad--modal" role="group" aria-label="Цифровая клавиатура">
        <button class="numpad-key" data-key="7">7</button>
        <button class="numpad-key" data-key="8">8</button>
        <button class="numpad-key" data-key="9">9</button>

        <button class="numpad-key" data-key="4">4</button>
        <button class="numpad-key" data-key="5">5</button>
        <button class="numpad-key" data-key="6">6</button>

        <button class="numpad-key" data-key="1">1</button>
        <button class="numpad-key" data-key="2">2</button>
        <button class="numpad-key" data-key="3">3</button>

        <button class="numpad-key" data-key=".">.</button>
        <button class="numpad-key" data-key="0">0</button>
        <button class="numpad-key numpad-key--action" data-key="backspace" aria-label="Удалить">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
            <line x1="18" y1="9" x2="12" y2="15"/>
            <line x1="12" y1="9" x2="18" y2="15"/>
          </svg>
        </button>
      </div>
      <button id="budget-modal-save" class="btn-save-limit">Сохранить</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       Шторка: выбор валюты
  ═══════════════════════════════════════ -->
  <div id="currency-options-sheet" class="bottom-sheet" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Выбор валюты">
    <div class="bottom-sheet-backdrop"></div>
    <div class="bottom-sheet-panel">
      <div class="bottom-sheet-handle"></div>
      <div class="bottom-sheet-options" role="listbox" aria-label="Валюта">
        <div class="currency-sheet-option" role="option" data-currency="RUB" aria-label="Российский рубль">
          <span class="cso-symbol">₽</span>
          <span class="cso-name">Российский рубль</span>
          <span class="cso-code">RUB</span>
        </div>
        <div class="currency-sheet-option" role="option" data-currency="GEL" aria-label="Грузинский лари">
          <span class="cso-symbol">₾</span>
          <span class="cso-name">Грузинский лари</span>
          <span class="cso-code">GEL</span>
        </div>
        <div class="currency-sheet-option" role="option" data-currency="USD" aria-label="Доллар США">
          <span class="cso-symbol">$</span>
          <span class="cso-name">Доллар США</span>
          <span class="cso-code">USD</span>
        </div>
        <div class="currency-sheet-option" role="option" data-currency="EUR" aria-label="Евро">
          <span class="cso-symbol">€</span>
          <span class="cso-name">Евро</span>
          <span class="cso-code">EUR</span>
        </div>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/gestures.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
